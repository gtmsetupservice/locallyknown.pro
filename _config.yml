# Site Settings
title: LocallyKnown.pro
description: Professional web services for local businesses. Custom websites, SEO, and digital marketing solutions.
url: https://locallyknown.pro
baseurl: ""

# SEO Settings
tagline: Grow Your Local Business Online
author:
  name: LocallyKnown.pro
  email: support@locallyknown.pro

# Jekyll Configuration
markdown: kramdown
permalink: /blog/:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Collections
collections:
  testimonials:
    output: false

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "LocallyKnown.pro"

# Analytics (to be configured)
google_analytics: # GA4 Measurement ID
gtm_container: # GTM Container ID

# CRM Settings
crm_endpoint: # Your FluentCRM API endpoint
crm_api_key: # Your FluentCRM API key

# Service-specific settings
service_type: local_business
emergency_price: "$997"
audit_price: "$1,297"
monitoring_price: "$297/month"